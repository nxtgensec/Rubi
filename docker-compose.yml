services:
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - qdrant

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rubi
      POSTGRES_PASSWORD: rubi
      POSTGRES_DB: rubi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:v1.10.1
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: minio/minio:RELEASE.2024-07-16T23-46-41Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: rubi
      MINIO_ROOT_PASSWORD: rubi-password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  ollama:
    image: ollama/ollama:0.2.8
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  livekit:
    image: livekit/livekit-server:v1.7
    command: --dev --bind 0.0.0.0
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
  ollama_data:
